services:
  postgres_db:
    image: postgres:16-alpine
    container_name: shop-postgres
    restart: always
    volumes:
      - postgres_db_data:/var/lib/postgresql/data
    ports:
      - "6543:5432"
    environment:
      POSTGRES_DB: vendure
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: 819LpPJvT_5FGtwgm7ZsRw

  vendure_server:
    image: ${REGISTRY_PREFIX:-ghcr.io/lehongminhh2004}/my-shop-vendure-server:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: shop-vendure-server
    restart: always
    expose:
      - "3000"
    environment:
      APP_ENV: prod
      PORT: 3000
      COOKIE_SECRET: OYn4obo1rjqEFnr1VN88zw
      SUPERADMIN_USERNAME: superadmin
      SUPERADMIN_PASSWORD: superadmin
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: vendure
      DB_USERNAME: vendure
      DB_PASSWORD: 819LpPJvT_5FGtwgm7ZsRw
      DB_SCHEMA: public
      DB_SYNCHRONIZE: "true"
    depends_on:
      - postgres_db
    volumes:
      - vendure_assets:/app/apps/server/static/assets

  vendure_worker:
    image: ${REGISTRY_PREFIX:-ghcr.io/lehongminhh2004}/my-shop-vendure-worker:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: shop-vendure-worker
    restart: always
    command: node apps/server/dist/index-worker.js
    environment:
      APP_ENV: prod
      DB_HOST: postgres_db
      DB_PORT: 5432
      DB_NAME: vendure
      DB_USERNAME: vendure
      DB_PASSWORD: 819LpPJvT_5FGtwgm7ZsRw
      DB_SCHEMA: public
      DB_SYNCHRONIZE: "false"
    depends_on:
      - postgres_db
      - vendure_server
    volumes:
      - vendure_assets:/app/apps/server/static/assets

  payload_cms:
    image: ${REGISTRY_PREFIX:-ghcr.io/lehongminhh2004}/my-shop-payload-cms:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    container_name: shop-payload-cms
    restart: always
    expose:
      - "3002"
    environment:
      PAYLOAD_SECRET: 1234567890abcdefghijklmnopqrstuvwxyz
      DATABASE_URI: postgres://vendure:819LpPJvT_5FGtwgm7ZsRw@postgres_db:5432/vendure
      PORT: 3002
      DB_PUSH: "true"
    depends_on:
      - postgres_db
    volumes:
      - cms_media:/app/apps/cms/media

  storefront:
    image: ${REGISTRY_PREFIX:-ghcr.io/lehongminhh2004}/my-shop-storefront:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    container_name: shop-storefront
    restart: always
    expose:
      - "3001"
    environment:
      VENDURE_SHOP_API_URL: http://vendure_server:3000/shop-api
      NEXT_PUBLIC_VENDURE_SHOP_API_URL: http://localhost:3000/shop-api
      VENDURE_CHANNEL_TOKEN: __default_channel__
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_NAME: my-shop
      REVALIDATION_SECRET: e1EX6Yeu0fjJ6X2qweSav50VjOxkNPFlMEeXEGvj7Dg=
      PAYLOAD_API_URL: http://payload_cms:3002/api
      NEXT_PUBLIC_PAYLOAD_API_URL: http://localhost:3002/api
    depends_on:
      - vendure_server
      - payload_cms

  nginx_proxy:
    image: nginx:alpine
    container_name: shop-nginx-proxy
    restart: always
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - storefront
      - vendure_server
      - payload_cms

volumes:
  postgres_db_data:
    external: true
    name: server_postgres_db_data
  vendure_assets:
    driver: local
  cms_media:
    driver: local
