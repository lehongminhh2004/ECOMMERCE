services:
  - type: web
    name: my-shop-vendure
    runtime: docker
    plan: free
    dockerfilePath: ./my-shop/apps/server/Dockerfile
    dockerContext: ./my-shop
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: prod
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DB_SCHEMA
        value: public
      - key: DB_SYNCHRONIZE
        value: "false"
      - key: VENDURE_DB_POOL_MAX
        value: "6"
      # Run worker in same process to avoid dual-scheduler cron conflicts on
      # the free tier (only one instance allowed).
      - key: RUN_WORKER_IN_PROCESS
        value: "true"
      # Set ASSET_STORAGE=cloudinary once you have Cloudinary credentials below.
      # Leave unset (or set to "local") to fall back to local disk storage.
      - key: ASSET_STORAGE
        value: cloudinary
      - key: ASSET_URL_PREFIX
        value: https://my-shop-vendure.onrender.com/assets
      # ── Secrets — set these manually in Render dashboard ──────────────────
      - key: DATABASE_URL
        sync: false
      - key: COOKIE_SECRET
        generateValue: true
      - key: SUPERADMIN_USERNAME
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      # ── Cloudinary ─────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: vendure-assets

  - type: web
    name: my-shop-payload-cms
    runtime: docker
    plan: free
    dockerfilePath: ./my-shop/apps/cms/Dockerfile
    dockerContext: ./my-shop
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      # DB_PUSH=false in production — migrations are run explicitly via
      # Payload's migration runner on deploy, not auto-pushed.
      - key: DB_PUSH
        value: "false"
      - key: PAYLOAD_DB_POOL_MAX
        value: "4"
      # ── Secrets — set these manually in Render dashboard ──────────────────
      - key: DATABASE_URI
        sync: false
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: STOREFRONT_REVALIDATE_URL
        sync: false
      - key: REVALIDATION_SECRET
        sync: false
      # ── Cloudinary ─────────────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: payload-cms
