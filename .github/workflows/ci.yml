name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: my-shop/package-lock.json

      - name: Install dependencies
        run: |
          cd my-shop
          npm ci

      - name: Run linting
        run: |
          cd my-shop
          npm run lint -w storefront
          npm run lint -w cms

      - name: Run TypeScript type check
        run: |
          cd my-shop
          npm run check-types -w storefront

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: my-shop/package-lock.json

      - name: Install dependencies
        run: |
          cd my-shop
          npm ci

      - name: Verify build compilation
        run: |
          cd my-shop
          npm run build

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create external volume
        run: docker volume create server_postgres_db_data

      - name: Setup environment file
        run: |
          cd my-shop
          echo "DB_PASSWORD=test_password" > .env
          echo "POSTGRES_PASSWORD=test_password" >> .env
          echo "COOKIE_SECRET=test_cookie_secret_long_enough_32_chars" >> .env
          echo "SUPERADMIN_USERNAME=superadmin" >> .env
          echo "SUPERADMIN_PASSWORD=superadmin" >> .env
          echo "PAYLOAD_SECRET=test_payload_secret_long_enough_32_chars" >> .env
          echo "DB_PUSH=true" >> .env
          echo "DB_SYNCHRONIZE=true" >> .env
          echo "APP_ENV=dev" >> .env
          echo "PORT=3000" >> .env
          echo "DB_HOST=postgres_db" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=vendure" >> .env
          echo "DB_USERNAME=vendure" >> .env
          echo "DB_SCHEMA=public" >> .env

      - name: Run Docker Compose Build & Up
        run: |
          cd my-shop
          docker compose up --build -d

      - name: Wait for services to initialize
        run: |
          echo "Waiting for database and backend servers to boot..."
          sleep 25

      - name: Verify Nginx proxy routing & endpoints
        run: |
          echo "=== Checking Vendure Backend Health ==="
          curl -f -v http://localhost:3000/health

          echo "=== Checking Payload CMS Admin ==="
          curl -f -I -v http://localhost:3002/admin

          echo "=== Checking Storefront Root Redirect ==="
          curl -f -I -v http://localhost:3001/

      - name: Dump logs on failure
        if: failure()
        run: |
          cd my-shop
          docker compose logs

      - name: Shut down containers
        run: |
          cd my-shop
          docker compose down -v
