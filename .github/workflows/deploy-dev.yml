name: Deploy to Dev/Staging

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Vendure Server & Worker (Single build, dual tag)
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./my-shop
          file: ./my-shop/apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-shop-vendure-server:dev
            ghcr.io/${{ github.repository_owner }}/my-shop-vendure-worker:dev
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # Build and push Payload CMS
      - name: Build and push Payload CMS Image
        uses: docker/build-push-action@v5
        with:
          context: ./my-shop
          file: ./my-shop/apps/cms/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-shop-payload-cms:dev
          cache-from: type=gha,scope=cms
          cache-to: type=gha,mode=max,scope=cms

      # Build and push Next.js Storefront (with build-time env vars)
      - name: Build and push Storefront Image
        uses: docker/build-push-action@v5
        with:
          context: ./my-shop
          file: ./my-shop/apps/storefront/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-shop-storefront:dev
          build-args: |
            VENDURE_SHOP_API_URL=${{ secrets.DEV_VENDURE_SHOP_API_URL || 'http://vendure_server:3000/shop-api' }}
            NEXT_PUBLIC_VENDURE_SHOP_API_URL=${{ secrets.DEV_NEXT_PUBLIC_VENDURE_SHOP_API_URL || 'http://localhost:3000/shop-api' }}
            NEXT_PUBLIC_PAYLOAD_API_URL=${{ secrets.DEV_NEXT_PUBLIC_PAYLOAD_API_URL || 'http://localhost:3002/api' }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Docker compose and Nginx configs to Dev Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "my-shop/docker-compose.yml,my-shop/nginx/nginx.conf"
          target: ${{ secrets.DEV_DEPLOY_PATH }}
          strip_components: 1

      - name: Execute Remote Deploy & Migration over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ${{ secrets.DEV_DEPLOY_PATH }}

            # Authenticate Docker client with GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Ensure external database volume exists
            docker volume create server_postgres_db_data || true

            # Pull latest dev images
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=dev docker compose pull

            # Run database migrations as a single-instance transaction
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=dev docker compose run --rm vendure_server node apps/server/dist/index.js --run-migrations

            # Scale up storefront for rolling update
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=dev docker compose up -d --no-recreate --scale storefront=2

            # Reload Nginx proxy to detect the new storefront container IP
            docker exec shop-nginx-proxy nginx -s reload || true

            # Wait for the new container to start handling traffic
            sleep 15

            # Scale back down to remove the old container
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=dev docker compose up -d --scale storefront=1

            # Reload Nginx proxy again to remove old IP routing
            docker exec shop-nginx-proxy nginx -s reload || true

            # Bring up the rest of the services (postgres, backend server, worker, cms)
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=dev docker compose up -d

            # Clean up old dangling images to free disk space
            docker image prune -af
