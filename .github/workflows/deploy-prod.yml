name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/docker-setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Vendure Server & Worker (Single build, dual tag)
      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./my-shop
          file: ./my-shop/apps/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/my-shop-vendure-server:latest
            ghcr.io/${{ github.repository_owner }}/my-shop-vendure-worker:latest
          cache-from: type=gha,scope=backend-prod
          cache-to: type=gha,mode=max,scope=backend-prod

      # Build and push Payload CMS
      - name: Build and push Payload CMS Image
        uses: docker/build-push-action@v5
        with:
          context: ./my-shop
          file: ./my-shop/apps/cms/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-shop-payload-cms:latest
          cache-from: type=gha,scope=cms-prod
          cache-to: type=gha,mode=max,scope=cms-prod

      # Build and push Next.js Storefront (with build-time env vars)
      - name: Build and push Storefront Image
        uses: docker/build-push-action@v5
        with:
          context: ./my-shop
          file: ./my-shop/apps/storefront/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-shop-storefront:latest
          build-args: |
            VENDURE_SHOP_API_URL=${{ secrets.PROD_VENDURE_SHOP_API_URL || 'http://vendure_server:3000/shop-api' }}
            NEXT_PUBLIC_VENDURE_SHOP_API_URL=${{ secrets.PROD_NEXT_PUBLIC_VENDURE_SHOP_API_URL || 'http://localhost:3000/shop-api' }}
            NEXT_PUBLIC_PAYLOAD_API_URL=${{ secrets.PROD_NEXT_PUBLIC_PAYLOAD_API_URL || 'http://localhost:3002/api' }}
          cache-from: type=gha,scope=storefront-prod
          cache-to: type=gha,mode=max,scope=storefront-prod

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Docker compose and Nginx configs to Production Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "my-shop/docker-compose.yml,my-shop/nginx/nginx.conf"
          target: ${{ secrets.PROD_DEPLOY_PATH }}
          strip_components: 1

      - name: Execute Remote Deploy & Migration over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}
            
            # Authenticate Docker client with GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Ensure external database volume exists
            docker volume create server_postgres_db_data || true
            
            # Pull latest production images
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=latest docker compose pull
            
            # Run database migrations as a single-instance transaction
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=latest docker compose run --rm vendure_server node apps/server/dist/index.js --run-migrations
            
            # Scale up storefront for rolling update
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=latest docker compose up -d --no-recreate --scale storefront=2
            
            # Reload Nginx proxy to detect the new storefront container IP
            docker exec shop-nginx-proxy nginx -s reload || true
            
            # Wait for the new container to start handling traffic
            sleep 15
            
            # Scale back down to remove the old container
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=latest docker compose up -d --scale storefront=1
            
            # Reload Nginx proxy again to remove old IP routing
            docker exec shop-nginx-proxy nginx -s reload || true
            
            # Bring up the rest of the services (postgres, backend server, worker, cms)
            REGISTRY_PREFIX=ghcr.io/${{ github.repository_owner }} IMAGE_TAG=latest docker compose up -d
            
            # Clean up old dangling images to free disk space
            docker image prune -af
